<!DOCTYPE html>
<html lang="zh-Hant">	
<head>
    <meta charset="UTF-8">
    <title>語法練習1~5</title>
</head>

<body>

    <h3>問題 1：超連結練習</h3>
    <a href="https://www.youtube.com/" target="_blank">前往 YouTube 首頁</a>

    <hr>

    <h3>問題 2：圖片與標題練習</h3>
    <figure>
        <img src="https://cdn.unwire.hk/wp-content/uploads/2017/08/newyoutube.png" alt="圖片無法顯示" width="600" height="500">
        <figcaption>這是 Youtube 的 logo</figcaption>
    </figure>

    <hr>

    <h3>問題 3：無序列表練習</h3>
    <ul>
        <li>youtube</li>
        <li>google</li>
        <li>tsla</li>
    </ul>

    <hr>

    <h3>問題 4：帶有兩行文字的段落</h3>
    <p>這是第一行文字。</p>
    <p>這是第二行文字。</p>

    <hr>

    <h3>問題 5：兩列兩欄表格</h3>
    <table border="1">
        <tr>
            <th>標題1</th>
            <th>標題2</th>
        </tr>
        <tr>
            <td>內容1</td>
            <td>內容2</td>
        </tr>
        <tr>
            <td>內容3</td>
            <td>內容4</td>
        </tr>
    </table>

</body>
</html>
