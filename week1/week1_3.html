<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HTML 進階練習 3~5</title>
</head>
<body>

    <h3>問題 3：帶有占位符的表單</h3>
    <form action="#">
        <label>姓名：</label>
        <input type="text" placeholder="請輸入您的姓名">
        <br><br>

        <label>電子郵件：</label>
        <input type="email" placeholder="請輸入您的電子郵件">
        <br><br>

        <input type="submit" value="提交">
    </form>

    <hr> 
    
    <h3>問題 4：嵌套列表導航選單</h3>
    <ul>
        <li>首頁</li>
        <li>關於我們
            <ul>
                <li>團隊介紹</li>
                <li>公司歷史</li>
            </ul>
        </li>
        <li>服務項目
            <ul>
                <li>產品一</li>
                <li>產品二</li>
            </ul>
        </li>
        <li>聯絡我們</li>
    </ul>

    <hr>

    <h3>問題 5：卡片式佈局</h3>
    <div style="border: 1px solid #000; width: 300px; padding: 15px;">
        <img src="https://cdn.unwire.hk/wp-content/uploads/2017/08/newyoutube.png" alt="Youtube Logo圖片" style="width: 100%; height: auto;">
        
        <h3>Youtube Logo</h3>
        
        <p>這是一段卡片描述文字。這裡可以是一些簡短的介紹或描述內容。</p>
    </div>

</body>
</html>
