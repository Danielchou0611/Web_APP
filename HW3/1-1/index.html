<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣天氣預報 - Node.js 版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        /* 1. 基礎設定 */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #74b9ff, #a29bfe); 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
        }

        /* 2. 卡片容器 */
        .card { 
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            width: 90%; 
            max-width: 800px; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h2 { color: #2d3436; margin-bottom: 30px; font-size: 28px; }

        /* 3. 表單 */
        .weather-form { 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        select { flex: 2; min-width: 200px; }
        button { flex: 1; min-width: 120px; }

        select, button { 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 18px; 
            border: none;
        }

        select { border: 2px solid #dfe6e9; cursor: pointer; }
        button { background-color: #0984e3; color: white; font-weight: 600; cursor: pointer; }
        button:hover { background-color: #00a8ff; }

        /* 4. 結果區域 */
        .result-area { 
            margin-top: 30px; 
            padding-top: 30px; 
            border-top: 2px solid #f1f2f6; 
        }

        /* 5. 天氣資訊展示 */
        .forecast-time { color: #636e72; margin-bottom: 20px; }
        
        .weather-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .weather-state { font-size: 24px; font-weight: bold; color: #2d3436; margin-top: 10px; }

        .weather-info-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .info-box {
            flex: 1;
            min-width: 180px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label { color: #636e72; font-size: 14px; margin-bottom: 5px; }
        .info-value { color: #0984e3; font-size: 22px; font-weight: bold; }

        .weather-icon { 
            width: 120px; 
            height: 120px; 
            transition: transform 0.3s ease; 
        }

        @media (max-width: 600px) {
            .card { padding: 25px; }
            .weather-form { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const WeatherApp = () => {
            const [city, setCity] = useState('');
            const [weatherData, setWeatherData] = useState(null);
            const [loading, setLoading] = useState(false);

            const fetchWeather = async (e) => {
                e.preventDefault();
                if (!city) return;

                setLoading(true);
                setWeatherData(null);

                try {
                    // 呼叫 Node.js 的後端 API
                    const response = await fetch(`/api/weather?locationName=${encodeURIComponent(city)}`);
                    const data = await response.json();

                    if (data.success === 'true' && data.records.location.length > 0) {
                        const location = data.records.location[0];
                        const weatherElement = location.weatherElement;
                        const wx = weatherElement.find(el => el.elementName === 'Wx').time[0];
                        const startTime = new Date(wx.startTime);

                        setWeatherData({
                            locationName: location.locationName,
                            timeString: `${startTime.getMonth() + 1}/${startTime.getDate()} ${startTime.getHours().toString().padStart(2, '0')}:00 預報`,
                            weatherState: wx.parameter.parameterName,
                            iconUrl: `https://www.cwa.gov.tw/V8/assets/img/weather_icons/weathers/svg_icon/day/${wx.parameter.parameterValue.padStart(2, '0')}.svg`,
                            minTemp: weatherElement.find(el => el.elementName === 'MinT').time[0].parameter.parameterName,
                            maxTemp: weatherElement.find(el => el.elementName === 'MaxT').time[0].parameter.parameterName,
                            pop: weatherElement.find(el => el.elementName === 'PoP').time[0].parameter.parameterName,
                        });
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('讀取天氣資料失敗，請確認後端伺服器是否啟動。');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="card">
                    <h2>台灣天氣預報</h2>
                    
                    <form className="weather-form" onSubmit={fetchWeather}>
                        <select value={city} onChange={(e) => setCity(e.target.value)} required>
                            <option value="" disabled>請選擇縣市</option>
                            <optgroup label="北部地區">
                                <option value="臺北市">臺北市</option>
                                <option value="新北市">新北市</option>
                                <option value="基隆市">基隆市</option>
                                <option value="桃園市">桃園市</option>
                                <option value="新竹市">新竹市</option>
                                <option value="新竹縣">新竹縣</option>
                                <option value="宜蘭縣">宜蘭縣</option>
                            </optgroup>
                            <optgroup label="中部地區">
                                <option value="臺中市">臺中市</option>
                                <option value="苗栗縣">苗栗縣</option>
                                <option value="彰化縣">彰化縣</option>
                                <option value="南投縣">南投縣</option>
                                <option value="雲林縣">雲林縣</option>
                            </optgroup>
                            <optgroup label="南部地區">
                                <option value="高雄市">高雄市</option>
                                <option value="臺南市">臺南市</option>
                                <option value="嘉義市">嘉義市</option>
                                <option value="嘉義縣">嘉義縣</option>
                                <option value="屏東縣">屏東縣</option>
                            </optgroup>
                            <optgroup label="東部地區">
                                <option value="花蓮縣">花蓮縣</option>
                                <option value="臺東縣">臺東縣</option>
                            </optgroup>
                            <optgroup label="離島地區">
                                <option value="澎湖縣">澎湖縣</option>
                                <option value="金門縣">金門縣</option>
                                <option value="連江縣">連江縣</option>
                            </optgroup>
                        </select>
                        <button type="submit">查詢天氣</button>
                    </form>

                    <div className="result-area">
                        {loading && <p>讀取中...</p>}
                        {!loading && !weatherData && <p style={{color: '#999'}}>請選擇城市並點擊查詢</p>}
                        {weatherData && (
                            <div>
                                <h3>{weatherData.locationName}</h3>
                                <p className="forecast-time">{weatherData.timeString}</p>
                                
                                <div className="weather-display">
                                    <img src={weatherData.iconUrl} alt={weatherData.weatherState} className="weather-icon" />
                                    <div className="weather-state">{weatherData.weatherState}</div>
                                </div>

                                <div className="weather-info-container">
                                    <div className="info-box">
                                        <div className="info-label">氣溫範圍</div>
                                        <div className="info-value">{weatherData.minTemp}°C - {weatherData.maxTemp}°C</div>
                                    </div>
                                    <div className="info-box">
                                        <div className="info-label">降雨機率</div>
                                        <div className="info-value">{weatherData.pop}%</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WeatherApp />);
    </script>
</body>
</html>
